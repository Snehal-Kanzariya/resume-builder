<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResumeAI — Free AI-Powered Resume Builder</title>
    <meta name="description" content="Build professional resumes in minutes with AI enhancement. 10 templates, live preview, instant PDF download. Free and open source." />
    <meta name="theme-color" content="#2563eb" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="ResumeAI — Free AI-Powered Resume Builder" />
    <meta property="og:description" content="Build professional resumes in minutes with AI enhancement. 10 templates, live preview, instant PDF download. Free and open source." />
    <meta property="og:image"       content="/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="ResumeAI — Free AI-Powered Resume Builder" />
    <meta name="twitter:description" content="Build professional resumes in minutes with AI enhancement. 10 templates, live preview, instant PDF download." />
  </head>
  <body>
    <div id="root"></div>
    <!-- GitHub Pages SPA: restore path from 404.html redirect -->
    <script>
      (function(){
        var p = window.location.search.slice(1).split('&').find(function(s){ return s.startsWith('p='); });
        if (p) {
          p = decodeURIComponent(p.slice(2));
          window.history.replaceState(null, null, p || '/');
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
